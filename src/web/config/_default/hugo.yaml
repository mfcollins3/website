copyright: "Copyright 2024 Michael F. Collins, III"
defaultContentLanguage: en
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: true
languageCode: "en-US"
markup:
asciidocExt:
  extensions:
    - asciidoctor-bibtex
    - asciidoctor-diagram
    - asciidoctor-interdoc-reftext
    - asciidoctor-katex
    - asciidoctor-mathematical
module:
  imports:
    - path: github.com/mfcollins3/website/src/themes/normal
newContentEditor: code
permalinks:
  page:
    blog: /blog/:year/:month/:slug
security:
  exec:
    allow:
      - asciidoctor
      - ^(dart-)?sass(-embedded)?$
      - ^go$
      - ^git$
      - ^npx$
      - ^postcss$
    osEnv:
      - (?i)^((HTTPS?|NO)_PROXY|PATH(EXT)?|APPDATA|TE?MP|TERM|GO\w+|(XDG_CONFIG_)?HOME|USERPROFILE|SSH_AUTH_SOCK|DISPLAY|LANG|SYSTEMDRIVE|GEM_PATH)$
timeZone: "America/Phoenix"
title: "Michael F. Collins, III"